<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset your password</title>
  <style>
    :root{--bg:#f4f6f8;--card:#fff;--accent:#6d28d9;--muted:#6b7785}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;background:var(--bg);color:#111}
    .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{width:100%;max-width:520px;background:var(--card);border-radius:12px;box-shadow:0 6px 24px rgba(20,30,40,0.08);overflow:hidden}
    .header{background:linear-gradient(120deg,#8200FF,#250047);padding:28px 24px;color:#fff;text-align:center}
    .header .brand{font-weight:700;font-size:18px}
    .body{padding:28px 24px}
    h1{margin:0 0 8px;font-size:20px}
    p{margin:0 0 16px;color:#263238}
    label{display:block;font-size:13px;margin-bottom:6px;color:#263238}
    input[type="password"]{width:100%;padding:12px;border-radius:8px;border:1px solid #e6eef6;font-size:14px;box-sizing:border-box}
    .row{margin-bottom:14px}
    .btn{display:inline-block;padding:12px 18px;border-radius:10px;text-decoration:none;font-weight:600;background:var(--accent);color:#fff;border:none;cursor:pointer}
    .muted{color:var(--muted);font-size:13px}
    .help{font-size:13px;color:#d43b3b;margin-top:6px}
    .success{font-size:14px;color:green;margin-top:6px}
    .footer{background:#fbfdff;padding:14px 24px;border-top:1px solid #eef3f7;color:var(--muted);font-size:13px}
    .hidden{display:none}
    .spinner{display:inline-block;margin-left:8px;border:2px solid rgba(255,255,255,0.3);border-left-color:rgba(255,255,255,0.9);width:14px;height:14px;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media (max-width:420px){.header{padding:22px}.body{padding:20px}.btn{width:100%}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="article" aria-label="Reset password">
      <div class="header">
        <div class="brand">Car_Rental_pet</div>
      </div>

      <div class="body">
        <h1>Reset your password</h1>
        <p class="muted" id="subtitle">Enter a new password for your account.</p>

        <div id="form-area">
          <div class="row">
            <label for="password">New password</label>
            <input id="password" type="password" autocomplete="new-password" placeholder="At least 8 characters" />
          </div>

          <div class="row">
            <label for="confirm">Confirm password</label>
            <input id="confirm" type="password" autocomplete="new-password" placeholder="Repeat new password" />
          </div>

          <div class="row">
            <button id="submit" class="btn">Set new password</button>
            <span id="busy" class="hidden"><span class="spinner" aria-hidden="true"></span></span>
          </div>

          <div id="message" class="help" role="status" aria-live="polite"></div>
        </div>

        <div id="status-success" class="hidden">
          <p class="success">Your password was reset. You can now <a href="/login">sign in</a> with the new password.</p>
        </div>
      </div>

      <div class="footer">
        This link will expire in 30 minutes for security reasons.
      </div>
    </div>
  </div>

  <script>
    (function(){
      // CONFIG: change to your API origin
      const API_URL = window.__API_URL__ || (location.origin); // override when building

      const getTokenFromUrl = () => {
        // Two common patterns:
        // 1) /reset?token=...   -> URLSearchParams
        // 2) /reset/<token>     -> last path segment
        const urlParams = new URLSearchParams(location.search);
        if (urlParams.has('token')) return urlParams.get('token');

        const parts = location.pathname.split('/').filter(Boolean);
        if (parts.length) return parts[parts.length - 1];

        return null;
      };

      const token = getTokenFromUrl();
      const submitBtn = document.getElementById('submit');
      const passwordEl = document.getElementById('password');
      const confirmEl = document.getElementById('confirm');
      const messageEl = document.getElementById('message');
      const busyEl = document.getElementById('busy');
      const formArea = document.getElementById('form-area');
      const successArea = document.getElementById('status-success');

      function showMessage(text, isError = true){
        messageEl.textContent = text;
        messageEl.style.color = isError ? '#d43b3b' : 'green';
      }

      if (!token){
        formArea.innerHTML = '<p class="help">Invalid or missing token. Please request a new password reset.</p>';
      }

      function validatePassword(p, c){
        if (!p || p.length < 8) return 'Password must be at least 8 characters.';
        if (p !== c) return 'Passwords do not match.';
        // Additional checks recommended: uppercase, number, symbol, not common password, etc.
        return null;
      }

      async function submit(e){
        e && e.preventDefault();
        messageEl.textContent = '';
        const p = passwordEl.value.trim();
        const c = confirmEl.value.trim();

        const vErr = validatePassword(p, c);
        if (vErr){ showMessage(vErr, true); return; }

        submitBtn.disabled = true;
        busyEl.classList.remove('hidden');

        try {
          // POST to your backend reset endpoint.
          // Decide API shape: below example sends JSON { token, password } to POST /api/auth/reset_password
          const res = await fetch(`${API_URL}/api/auth/reset_password`, {
            method: 'POST',
            credentials: 'include', // optional: if you use cookies for auth
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json'
            },
            body: JSON.stringify({ token: token, password: p })
          });

          if (!res.ok){
            // try to parse message
            let body;
            try { body = await res.json(); } catch(e){ body = { detail: await res.text() }; }
            const errMsg = body?.detail || body?.message || `Server returned ${res.status}`;
            showMessage(errMsg, true);
            return;
          }

          // success
          formArea.classList.add('hidden');
          successArea.classList.remove('hidden');

        } catch (err){
          console.error(err);
          showMessage('Network error — please try again.', true);
        } finally {
          submitBtn.disabled = false;
          busyEl.classList.add('hidden');
        }
      }

      submitBtn.addEventListener('click', submit);

      // allow Enter to submit
      [passwordEl, confirmEl].forEach(inp => inp.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') submit();
      }));

      // optionally, prefill user name if token decodes on frontend (not recommended) — better to let backend respond with user data
    })();
  </script>
</body>
</html>
